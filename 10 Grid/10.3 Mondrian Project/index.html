<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #container {
      width: 748px;
      height: 748px;
      background-color: black;
      display: grid;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 22px;
      gap: 9px;
    }
    #box1 {
      background-color: #E72F24;
    }
    #box2 {
      background-color: #F0F1EC;
      grid-column: span 3;
    }
    #box3 {
      background-color: #F0F1EC;
      grid-row: span 2;
    }
    #box4 {
      background-color: #F0F1EC;
      grid-row: span 2;
      grid-column: span 2;
    }
    #box5 {
      background-color: #004592;
      border-bottom: 10px solid black;
    }
    #box6 {
      background-color: #F0F1EC;
      grid-row: span 2
    }
    #box7 {
      background-color: #F0F1EC;
    }
    #box8 {
      background-color: #F9D01E;
    }
    #box9 {
      background-color: #232629;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="box1">

    </div>
    <div id="box2">
      
    </div>
    <div id="box3">

    </div>
    <div id="box4">

    </div>
    <div id="box5">

    </div>
    <div id="box6">

    </div>
    <div id="box7">

    </div>
    <div id="box8">

    </div>
    <div id="box9">

    </div>
  </div>
</body>

</html>
